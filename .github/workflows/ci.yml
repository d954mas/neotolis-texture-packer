name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # The engine submodule stores binary assets in LFS; libraries build without
      # them, but pull to be safe for future targets that read assets.
      - name: Pull submodule LFS files
        run: git submodule foreach --recursive 'git lfs pull || true'

      # Boundary gates (docs/plans/op-layer-and-cli.md §A6): cheap grep rules
      # keeping the tp_core/frontend split honest. One leg is enough.
      - name: Check layer boundaries
        if: runner.os == 'Linux'
        run: bash scripts/check_boundaries.sh

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y clang ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libgl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y --no-progress

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}
          max-size: "400M"

      - name: Enable ccache compiler launcher
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Configure
        run: cmake --preset native-release

      - name: Build
        run: cmake --build --preset native-release

      - name: Test
        run: ctest --preset native-release

  # The GUI self-test (#50 ntpacker_gui_selftest, J-series) is the primary GUI regression
  # harness but needs a real GL context, so it is NOT in the build-test job above. Run it here
  # under a headless software-GL stack. Linux-first (xvfb + Mesa llvmpipe is reliable); Windows
  # and macOS headless-GL are added once proven. native-tests-debug bakes the self-test flags.
  gui-selftest:
    name: gui-selftest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull submodule LFS files
        run: git submodule foreach --recursive 'git lfs pull || true'

      - name: Install dependencies (Linux + headless GL)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y clang ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libgl-dev \
            xvfb libgl1-mesa-dri

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: gui-selftest-${{ matrix.os }}
          max-size: "400M"

      - name: Enable ccache compiler launcher
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Configure
        run: cmake --preset native-tests-debug

      - name: Build
        run: cmake --build --preset native-tests-debug

      # xvfb gives a virtual X display; llvmpipe forces Mesa's software GL so the self-test
      # gets a modern GL context with no GPU. -R limits the run to the GUI self-test exe.
      - name: Run GUI self-test (headless, software GL)
        if: runner.os == 'Linux'
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
        run: xvfb-run -a ctest --preset native-tests-debug -R ntpacker_gui_selftest --output-on-failure
