name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # The engine submodule stores binary assets in LFS; libraries build without
      # them, but pull to be safe for future targets that read assets.
      - name: Pull submodule LFS files
        run: git submodule foreach --recursive 'git lfs pull || true'

      # Boundary gates (see git history: docs/plans/op-layer-and-cli.md §A6, removed 2026-07-20): cheap grep rules
      # keeping the tp_core/frontend split honest. One leg is enough.
      - name: Check layer boundaries
        if: runner.os == 'Linux'
        run: bash scripts/check_boundaries.sh

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y clang ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libgl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y --no-progress

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.os }}
          max-size: "400M"

      - name: Enable ccache compiler launcher
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Configure
        run: cmake --preset native-release

      - name: Build
        run: cmake --build --preset native-release

      - name: Test
        run: ctest --preset native-release

  # The GUI self-test (#50 ntpacker_gui_selftest, J-series) is the primary GUI regression
  # harness but needs a real GL context, so it is NOT in the build-test job above. Run it here
  # under a headless software-GL stack. Linux-first (xvfb + Mesa llvmpipe is reliable); Windows
  # and macOS headless-GL are added once proven. native-tests-debug bakes the self-test flags.
  gui-selftest:
    name: gui-selftest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull submodule LFS files
        run: git submodule foreach --recursive 'git lfs pull || true'

      - name: Install dependencies (Linux + headless GL)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y clang ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libgl-dev \
            xvfb libgl1-mesa-dri

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: gui-selftest-${{ matrix.os }}
          max-size: "400M"

      - name: Enable ccache compiler launcher
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Configure
        run: cmake --preset native-tests-debug

      # Every first-party test executable carries both sanitizer compile and link
      # flags. Build the complete Debug graph here so the core/session/recovery
      # foundation is exercised under ASan+UBSan as well as the GUI self-test.
      - name: Build sanitized Debug graph
        run: cmake --build --preset native-tests-debug

      - name: Run headless core tests (ASan+UBSan)
        env:
          ASAN_OPTIONS: "detect_leaks=0"
          UBSAN_OPTIONS: "print_stacktrace=1"
        run: ctest --preset native-tests-debug -E ntpacker_gui_selftest --output-on-failure

      # xvfb gives a virtual X display; llvmpipe forces Mesa's software GL so the self-test gets a
      # modern GL context with no GPU. LSan (part of ASan) is off for now -- the engine/GL driver
      # never free some allocations on a deliberate process exit, which would fail the job on benign
      # leaks; ASan memory-error detection + UBSan (the UAF class we want) stay on. Leak baseline TODO.
      # NTPACKER_GUI_HEADLESS=1: this runner has no real GL -- under xvfb+llvmpipe the engine's
      # materials/shaders/font atlas never reach "ready" (can_render stays false, nothing rasterizes),
      # so the self-test's render/layout VISUAL phases (outline pixel probe, touch-on-render, overflow
      # sweeps) are skipped. The full logical selftest (journal/undo/recovery/pack/export/rename) and the
      # GL-independent async-shutdown phase still run under ASan+UBSan; the visual phases stay hard locally.
      - name: Run GUI self-test (headless, software GL, ASan+UBSan)
        if: runner.os == 'Linux'
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
          ASAN_OPTIONS: "detect_leaks=0"
          UBSAN_OPTIONS: "print_stacktrace=1"
          NTPACKER_GUI_HEADLESS: "1"
        run: xvfb-run -a ctest --preset native-tests-debug -R ntpacker_gui_selftest --output-on-failure

  # U-01 perf harness (impl-plan §U). Two-tier gate: wall-clock latency is PRINTED (advisory --
  # CI runners are noisy, so timing never fails the build) while the DETERMINISTIC invariants are
  # hard-gated by each probe's exit code. Runs native-release (NTPACKER_GUI_SELFTEST=OFF, so the GUI
  # binary honours --bench-perf instead of auto-running the self-test; release also gives realistic,
  # ASan-free numbers). This is the only job with lfs: true -- the decode probes need the real Kenney
  # bytes; the byte-stable fixture contract (tp_bench_project_contract) stays LFS-independent and runs
  # in the build-test/gui-selftest jobs without it.
  perf-probes:
    name: perf-probes (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true # U-01 bench assets (Kenney PNGs) live in Git LFS; the decode probes need real bytes.

      - name: Pull submodule LFS files
        run: git submodule foreach --recursive 'git lfs pull || true'

      - name: Install dependencies (Linux + headless GL)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y clang ninja-build \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libgl-dev \
            xvfb libgl1-mesa-dri

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: perf-probes-${{ matrix.os }}
          max-size: "400M"

      - name: Enable ccache compiler launcher
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Configure (native-release, self-test OFF)
        run: cmake --preset native-release

      - name: Build perf targets
        run: cmake --build --preset native-release --target tp_bench_foundation ntpacker-gui

      # Advisory latency numbers land in the log; each probe still hard-fails on its deterministic
      # gate: --pack-hash-probe exits non-zero on a NON-DETERMINISTIC content hash (cold != warm),
      # and --bench-perf exits non-zero on a non-blocking-invariant violation (a Pack request that
      # blocks the caller, or a refresh that mutates project revision/dirty state).
      - name: U-01 perf probes (advisory numbers, deterministic hard-gates)
        if: runner.os == 'Linux'
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: llvmpipe
          NTPACKER_GUI_HEADLESS: "1"
        run: |
          set -e
          FIXTURE=examples/projects/bench-owner-scale.ntpacker_project
          BENCH=$(find build -type f -name tp_bench_foundation | head -1)
          GUI=$(find build -type f -path '*apps/gui*' -name ntpacker-gui | head -1)
          echo "BENCH=$BENCH"
          echo "GUI=$GUI"
          echo "== pack_input_hash cold/warm probe (advisory timings; hard gate = hash determinism) =="
          "$BENCH" --pack-hash-probe "$FIXTURE" 5
          echo "== GUI --bench-perf (advisory timings; hard gate = non-blocking invariants) =="
          xvfb-run -a "$GUI" --bench-perf
